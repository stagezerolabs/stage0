specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PresaleFactory
    network: rise-sepolia
    source:
      address: "0x67064a9236050D3d947d7F5Bd3448BD4b5D947FC"
      abi: PresaleFactory
      startBlock: 37873306
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Presale
      abis:
        - name: PresaleFactory
          file: ./abis/PresaleFactory.json
        - name: LaunchpadPresale
          file: ./abis/LaunchpadPresale.json
        - name: ERC20Metadata
          file: ./abis/ERC20Metadata.json
      eventHandlers:
        - event: PresaleCreated(indexed address,indexed address,indexed address,address,bool)
          handler: handlePresaleCreated
      file: ./src/presaleFactory.ts
  - kind: ethereum
    name: NFTFactory
    network: rise-sepolia
    source:
      address: "0x6DDca710993C91402d52061868bE76043a4C5888"
      abi: NFTFactory
      startBlock: 37471045
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NftCollection
      abis:
        - name: NFTFactory
          file: ./abis/NFTFactory.json
        - name: LaunchpadNFT
          file: ./abis/LaunchpadNFT.json
      eventHandlers:
        - event: NFTCreated(indexed address,indexed address,indexed bool)
          handler: handleNftCreated
      file: ./src/nftFactory.ts
templates:
  - kind: ethereum
    name: PresaleContract
    network: rise-sepolia
    source:
      abi: LaunchpadPresale
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Presale
      abis:
        - name: LaunchpadPresale
          file: ./abis/LaunchpadPresale.json
        - name: ERC20Metadata
          file: ./abis/ERC20Metadata.json
      eventHandlers:
        - event: ContributionReceived(indexed address,uint256,uint256)
          handler: handleContributionReceived
        - event: ConfigUpdated((uint64,uint64,uint256,uint256,uint256,uint256,uint256))
          handler: handleConfigUpdated
        - event: TokensDeposited(uint256)
          handler: handleTokensDeposited
        - event: PresaleFinalized(bool)
          handler: handlePresaleFinalized
        - event: ClaimsEnabled()
          handler: handleClaimsEnabled
        - event: RefundClaimed(indexed address,uint256)
          handler: handleRefundClaimed
      file: ./src/presale.ts
  - kind: ethereum
    name: NftCollectionContract
    network: rise-sepolia
    source:
      abi: LaunchpadNFT
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NftCollection
      abis:
        - name: LaunchpadNFT
          file: ./abis/LaunchpadNFT.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: MintConfigUpdated((uint64,uint64,uint32,uint128))
          handler: handleMintConfigUpdated
        - event: ContractURIUpdated(string)
          handler: handleContractURIUpdated
        - event: PayoutWalletUpdated(indexed address)
          handler: handlePayoutWalletUpdated
        - event: SaleTermsUpdated((string,string,address,uint64,uint64,uint128,uint32))
          handler: handleSaleTermsUpdated
      file: ./src/nftCollection.ts
